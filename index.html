<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍽️ When2Eat — 美食轉盤推薦平臺 (MVP)</title>
    <style>
        /* --- 全域 & 版面配置 --- */
        :root {
            --primary-color: #ff6347; /* 珊瑚紅 */
            --secondary-color: #ffdac1; /* 淺橘 */
            --background-color: #fdf5e6; /* 米白 */
            --text-color: #333;
            --light-gray: #ccc;
            --white: #fff;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            gap: 30px;
            flex-wrap: wrap;
        }

        .container {
            background: var(--white);
            padding: 25px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            max-width: 1000px;
            width: 100%;
        }

        h1, h2 {
            text-align: center;
            color: var(--primary-color);
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 1.5em;
            border-bottom: 2px solid var(--secondary-color);
            padding-bottom: 10px;
            margin-top: 25px;
        }

        .main-content {
            display: flex;
            gap: 30px;
            margin-top: 20px;
            flex-wrap: wrap;
            align-items: flex-start;
        }

        .left-panel {
            flex: 1;
            min-width: 350px;
        }

        .right-panel {
            flex: 2;
            min-width: 400px;
        }
        
        /* --- 轉盤區塊 --- */
        .turntable-container {
            position: relative;
            width: 350px;
            height: 350px;
            margin: 20px auto;
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid var(--primary-color);
            transition: transform 5s cubic-bezier(0.25, 1, 0.5, 1); /* 緩出動畫 */
            box-shadow: var(--shadow);
        }

        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 30px solid var(--primary-color);
            z-index: 10;
        }
        
        #spinBtn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--white);
            color: var(--primary-color);
            border: 5px solid var(--secondary-color);
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10;
            transition: background-color 0.3s, transform 0.1s;
        }
        
        #spinBtn:hover {
            background-color: var(--secondary-color);
        }

        #spinBtn:active {
            transform: translate(-50%, -50%) scale(0.95);
        }

        #spinBtn:disabled {
            cursor: not-allowed;
            background-color: var(--light-gray);
            color: var(--text-color);
        }

        /* --- 結果顯示區塊 --- */
        .result-container {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background-color: var(--secondary-color);
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #resultText {
            font-size: 1.8em;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 10px;
        }
        
        #map {
            width: 100%;
            height: 250px;
            margin-top: 15px;
            border-radius: 10px;
            display: none; /* 預設隱藏 */
        }
        
        /* --- 篩選與餐廳列表 --- */
        .filters, .restaurant-list {
            padding: 15px;
            border: 1px solid var(--secondary-color);
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .filter-group label {
            display: flex;
            align-items: center;
            background-color: #f9f9f9;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .filter-group input[type="checkbox"] {
            margin-right: 8px;
        }

        .filter-group label:has(input:checked) {
            background-color: var(--secondary-color);
            color: var(--primary-color);
            font-weight: bold;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .restaurant-name {
            font-size: 1.1em;
        }
        
        .restaurant-category {
            font-size: 0.8em;
            color: #888;
            background: #f0f0f0;
            padding: 3px 8px;
            border-radius: 10px;
            margin-left: 8px;
        }

        .fav-btn {
            background: none;
            border: none;
            font-size: 1.8em;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .fav-btn.favorited {
            color: var(--primary-color);
        }

        .fav-btn:hover {
            transform: scale(1.2);
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>🍽️ When2Eat</h1>
        <div class="main-content">
            <div class="left-panel">
                <div class="turntable-container">
                    <div class="pointer"></div>
                    <canvas id="wheel" width="350" height="350"></canvas>
                    <button id="spinBtn">轉動</button>
                </div>

                <div class="result-container">
                    <div id="resultText">轉動轉盤，決定下一餐！</div>
                    <div id="map"></div>
                </div>
            </div>

            <div class="right-panel">
                <div class="filters">
                    <h2>🍔 餐廳分類篩選</h2>
                    <div id="filter-container" class="filter-group">
                        </div>
                </div>

                <div class="restaurant-list">
                    <h2>❤️ 餐廳 & 收藏清單</h2>
                    <div id="restaurant-list-container">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script async defer src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&callback=initApp"></script>

    <script>
        // --- 初始資料定義 ---
        const initialRestaurants = [
            { id: 1, name: "鼎泰豐", category: "中式", address: "台北市信義路二段194號" },
            { id: 2, name: "麥當勞", category: "速食", address: "台北市館前路8號" },
            { id: 3, name: "壽司郎", category: "日式", address: "台北市中正區館前路8號2樓" },
            { id: 4, name: "海底撈", category: "火鍋", address: "台北市信義區松壽路12號6樓" },
            { id: 5, name: "星巴克", category: "咖啡廳", address: "台北市中正區許昌街1號" },
            { id: 6, name: "路易莎咖啡", category: "咖啡廳", address: "新北市板橋區縣民大道二段7號" },
            { id: 7, name: "鬍鬚張魯肉飯", category: "中式", address: "台北市大安區羅斯福路三段316巷8弄3之1號" },
            { id: 8, name: "Lady M", category: "甜點", address: "台北市大安區光復南路240巷26號" },
            { id: 9, name: "IKEA 餐廳", category: "西式", address: "新北市新莊區中正路1號" },
            { id: 10, name: "瓦城泰國料理", category: "異國料理", address: "台北市大安區忠孝東路四段45號11樓" },
            { id: 11, name: "肯德基", category: "速食", address: "台北市萬華區成都路81號" },
            { id: 12, name: "一蘭拉麵", category: "日式", address: "台北市信義區松仁路97號" }
        ];

        // --- 狀態管理 ---
        let state = {
            restaurants: initialRestaurants,
            favorites: [], // 儲存收藏餐廳的 id
            filteredCategories: new Set(),
            isSpinning: false,
            rotation: 0,
        };

        const FAVORITE_WEIGHT = 5; // 收藏的餐廳權重是未收藏的 5 倍

        // --- DOM 元素 ---
        const wheelCanvas = document.getElementById('wheel');
        const ctx = wheelCanvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const resultText = document.getElementById('resultText');
        const filterContainer = document.getElementById('filter-container');
        const restaurantListContainer = document.getElementById('restaurant-list-container');
        const mapContainer = document.getElementById('map');

        // --- 轉盤繪製相關 ---
        const colors = ['#FFC3A0', '#FFAB91', '#FF8A80', '#FF7043', '#F4511E', '#BF360C'];
        
        function drawWheel() {
            const restaurantsToDraw = getFilteredRestaurants();
            const numOptions = restaurantsToDraw.length;
            const arcSize = 2 * Math.PI / numOptions;
            
            const centerX = wheelCanvas.width / 2;
            const centerY = wheelCanvas.height / 2;
            const radius = wheelCanvas.width / 2 - 10;

            ctx.clearRect(0, 0, wheelCanvas.width, wheelCanvas.height);
            ctx.font = '14px sans-serif';

            if (numOptions === 0) {
                ctx.fillStyle = '#ccc';
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('沒有符合的餐廳', centerX, centerY);
                return;
            }

            restaurantsToDraw.forEach((restaurant, i) => {
                const angle = i * arcSize;
                ctx.fillStyle = colors[i % colors.length];

                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, angle, angle + arcSize);
                ctx.closePath();
                ctx.fill();

                // 繪製文字
                ctx.save();
                ctx.fillStyle = '#fff';
                ctx.translate(centerX, centerY);
                ctx.rotate(angle + arcSize / 2);
                ctx.textAlign = 'right';
                ctx.textBaseline = 'middle';
                ctx.fillText(restaurant.name, radius - 15, 0);
                ctx.restore();
            });
        }
        
        // --- 核心功能 ---
        function spin() {
            if (state.isSpinning) return;

            const candidates = getFilteredRestaurants();
            if (candidates.length === 0) {
                resultText.textContent = "請先選擇餐廳類別！";
                return;
            }
            
            state.isSpinning = true;
            spinBtn.disabled = true;
            resultText.textContent = "轉動中...";
            mapContainer.style.display = 'none';

            // 建立加權列表
            const weightedList = [];
            candidates.forEach(r => {
                const weight = state.favorites.includes(r.id) ? FAVORITE_WEIGHT : 1;
                for (let i = 0; i < weight; i++) {
                    weightedList.push(r);
                }
            });

            // 隨機選出贏家
            const winner = weightedList[Math.floor(Math.random() * weightedList.length)];
            const winnerIndex = candidates.findIndex(r => r.id === winner.id);
            
            const arcSize = 360 / candidates.length;
            const randomOffset = Math.random() * arcSize - (arcSize / 2);
            const targetAngle = 360 * 5 + (360 - (winnerIndex * arcSize)) - (arcSize/2) + randomOffset;
            
            state.rotation += targetAngle;
            wheelCanvas.style.transform = `rotate(${state.rotation}deg)`;
            
            setTimeout(() => {
                state.isSpinning = false;
                spinBtn.disabled = false;
                resultText.textContent = `🎉 今天吃：${winner.name}！`;
                showMap(winner);
            }, 5000); // 與 CSS transition 時間一致
        }
        
        function getFilteredRestaurants() {
            if (state.filteredCategories.size === 0) {
                return state.restaurants;
            }
            return state.restaurants.filter(r => state.filteredCategories.has(r.category));
        }

        // --- 渲染畫面 ---
        function renderFilters() {
            const categories = [...new Set(state.restaurants.map(r => r.category))];
            filterContainer.innerHTML = '';
            categories.forEach(category => {
                const label = document.createElement('label');
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.value = category;
                checkbox.addEventListener('change', handleFilterChange);
                
                label.appendChild(checkbox);
                label.appendChild(document.createTextNode(category));
                filterContainer.appendChild(label);
            });
        }
        
        function renderRestaurantList() {
            restaurantListContainer.innerHTML = '';
            state.restaurants.forEach(r => {
                const isFavorited = state.favorites.includes(r.id);
                const item = document.createElement('div');
                item.className = 'list-item';
                item.innerHTML = `
                    <div>
                        <span class="restaurant-name">${r.name}</span>
                        <span class="restaurant-category">${r.category}</span>
                    </div>
                    <button class="fav-btn ${isFavorited ? 'favorited' : ''}" data-id="${r.id}">
                        ${isFavorited ? '❤️' : '🤍'}
                    </button>
                `;
                restaurantListContainer.appendChild(item);
            });
            
            // 綁定事件
            document.querySelectorAll('.fav-btn').forEach(btn => {
                btn.addEventListener('click', () => toggleFavorite(parseInt(btn.dataset.id)));
            });
        }
        
        // --- 事件處理 ---
        function handleFilterChange(event) {
            const category = event.target.value;
            if (event.target.checked) {
                state.filteredCategories.add(category);
            } else {
                state.filteredCategories.delete(category);
            }
            drawWheel();
        }

        function toggleFavorite(id) {
            const favIndex = state.favorites.indexOf(id);
            if (favIndex > -1) {
                state.favorites.splice(favIndex, 1);
            } else {
                state.favorites.push(id);
            }
            saveFavoritesToLocalStorage();
            renderRestaurantList(); // 重新渲染列表以更新愛心狀態
        }

        // --- LocalStorage ---
        function saveFavoritesToLocalStorage() {
            localStorage.setItem('when2eat_favorites', JSON.stringify(state.favorites));
        }

        function loadFavoritesFromLocalStorage() {
            const savedFavorites = localStorage.getItem('when2eat_favorites');
            if (savedFavorites) {
                state.favorites = JSON.parse(savedFavorites);
            }
        }
        
        // --- Google Map API ---
        let map;
        let geocoder;

        function initMapApi() {
            if (typeof google !== 'undefined' && google.maps) {
                geocoder = new google.maps.Geocoder();
            } else {
                console.error("Google Maps API did not load.");
                mapContainer.innerHTML = 'Google Map 無法載入。請檢查 API 金鑰是否正確，並已啟用相關服務。';
                mapContainer.style.display = 'block';
            }
        }
        
        function showMap(restaurant) {
            if (!geocoder) {
                mapContainer.style.display = 'block';
                mapContainer.textContent = "地圖服務初始化失敗。";
                return;
            };

            mapContainer.style.display = 'block';
            geocoder.geocode({ 'address': restaurant.address }, (results, status) => {
                if (status === 'OK') {
                    const location = results[0].geometry.location;
                    map = new google.maps.Map(mapContainer, {
                        center: location,
                        zoom: 16,
                    });
                    new google.maps.Marker({
                        map: map,
                        position: location,
                        title: restaurant.name
                    });
                } else {
                    mapContainer.textContent = `無法找到地址：${restaurant.address} (錯誤: ${status})`;
                }
            });
        }


        // --- 初始化 ---
        function initApp() {
            console.log("App initializing...");
            initMapApi();
            loadFavoritesFromLocalStorage();
            renderFilters();
            renderRestaurantList();
            drawWheel();

            spinBtn.addEventListener('click', spin);
        }

        // 當 Google Maps API 腳本載入並執行完畢後，會呼叫 initApp 函式
        // 這邊我們直接在全域範圍呼叫，因為我們的 script 標籤有 callback=initApp
        // window.onload = initApp; // 也可以用這個
    </script>

</body>
</html>
